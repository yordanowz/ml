<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ARCADE HUB | YORDANOWZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #00f2ff; --pink: #ff0055; --kick: #53fc18; --bg: #05050a; }
        * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }

        /* HEADER */
        .top-bar { display: flex; justify-content: space-between; padding: 15px 25px; background: #000; border-bottom: 2px solid var(--blue); font-family: 'Orbitron'; color: var(--blue); width: 100%; position: sticky; top: 0; z-index: 100; }

        .main-container { max-width: 800px; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 40px; }

        /* BLOCK BLAST */
        .game-section { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 15px; font-family: 'Orbitron'; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .grid-8x8 { display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); gap: 4px; background: #1a1a2e; padding: 10px; border-radius: 12px; border: 3px solid #222; }
        .cell { width: 45px; height: 45px; background: rgba(255,255,255,0.02); border-radius: 4px; }
        .cell.occupied { border: 1px solid rgba(255,255,255,0.3); }
        .cell.preview { background: rgba(255,255,255,0.15) !important; border: 1px dashed white; }
        .tray { display: flex; justify-content: center; gap: 20px; margin-top: 25px; min-height: 130px; background: rgba(255,255,255,0.02); border-radius: 15px; padding: 15px; width: 100%; }
        .piece { cursor: grab; display: grid; gap: 2px; }
        .p-cell { width: 28px; height: 28px; border-radius: 3px; }

        /* SLOTS SECTION */
        .slots-section { background: rgba(255,255,255,0.03); border: 2px solid var(--kick); border-radius: 20px; padding: 30px; width: 100%; max-width: 500px; text-align: center; }
        .slot-row { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .slot-box { width: 80px; height: 80px; background: #000; border: 2px solid #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

        /* OVERLAYS */
        #jackpot-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .jackpot-text { font-family: 'Orbitron'; font-size: 5rem; color: #ffcc00; text-shadow: 0 0 40px #ffcc00; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        #gameover { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .btn { background: var(--blue); color: #000; border: none; padding: 12px 30px; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; text-decoration: none; }
    </style>
</head>
<body>

<div id="jackpot-overlay">
    <div class="jackpot-text">JACKPOT!</div>
    <h1 style="color:var(--kick); margin-top:20px">+1000 CREDITS</h1>
    <p style="margin-top:10px; color:#ccc;">(Closing in 3s...)</p>
</div>

<div id="gameover">
    <h1 style="font-family:'Orbitron'; font-size:4rem; color:var(--pink)">GAME OVER</h1>
    <p style="font-size:1.5rem">SCORE: <span id="final-score">0</span></p>
    <button class="btn" onclick="location.reload()" style="margin-top:20px">RETRY</button>
</div>

<div class="top-bar">
    <div id="clock">00:00:00</div>
    <div style="font-family:'Orbitron'">ARCADE HUB 2026</div>
    <a href="index.html" class="btn" style="padding: 5px 15px; font-size: 0.7rem;">HOME</a>
</div>

<div class="main-container">
    <div class="game-section">
        <div class="stats-row">
            <div class="stat-card">SCORE <span id="score">0</span></div>
            <div class="stat-card">BEST <span id="best" style="color:var(--pink)">0</span></div>
        </div>
        <div class="grid-8x8" id="grid"></div>
        <div class="tray" id="tray"></div>
    </div>

    <div class="slots-section">
        <h2 style="font-family:'Orbitron'; color:var(--kick)">YORDANOWZ SLOTS</h2>
        <div class="slot-row">
            <div id="s1" class="slot-box">💎</div>
            <div id="s2" class="slot-box">💎</div>
            <div id="s3" class="slot-box">💎</div>
        </div>
        <p style="font-size:1.2rem; margin-bottom:15px;">CREDITS: <span id="balance" style="color:var(--kick)">500</span></p>
        <button class="btn" style="background:var(--kick)" onclick="spin()">SPIN (20)</button>
    </div>
</div>

<script>

            // В началото на всяка страница (index и games)
const savedPrimary = localStorage.getItem('primaryColor');
const savedSecondary = localStorage.getItem('secondaryColor');

if (savedPrimary) {
    document.documentElement.style.setProperty('--blue', savedPrimary);
}
if (savedSecondary) {
    document.documentElement.style.setProperty('--pink', savedSecondary);
}
    let credits = parseInt(localStorage.getItem('userCredits')) || 1337;
    localStorage.setItem('userCredits', credits);
    let best = localStorage.getItem('bb_best_v3') || 0;
    let board = Array(64).fill(null);
    let trayShapes = [];
    const COLORS = ['#FF3D00', '#FFEA00', '#00E676', '#00B0FF', '#D500F9', '#FF0055'];
    const SHAPES = [
        { c: [[0,0]], color: COLORS[0] }, { c: [[0,0],[0,1]], color: COLORS[1] },
        { c: [[0,0],[1,0]], color: COLORS[1] }, { c: [[0,0],[0,1],[1,0],[1,1]], color: COLORS[2] },
        { c: [[0,0],[0,1],[0,2]], color: COLORS[3] }, { c: [[0,0],[1,0],[2,0]], color: COLORS[3] },
        { c: [[0,0],[1,0],[2,0],[2,1]], color: COLORS[4] }, { c: [[0,0],[0,1],[0,2],[1,1]], color: COLORS[5] }
    ];

    document.getElementById('best').innerText = best;
    const gridEl = document.getElementById('grid');
    const trayEl = document.getElementById('tray');

    for(let i=0; i<64; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        gridEl.appendChild(cell);
    }

    function spawnPieces() {
        trayEl.innerHTML = ''; trayShapes = [];
        for(let i=0; i<3; i++) {
            const s = SHAPES[Math.floor(Math.random()*SHAPES.length)];
            trayShapes.push(s);
            const p = createPiece(s, i);
            trayEl.appendChild(p);
        }
        setTimeout(checkGameOver, 200);
    }

    function createPiece(shape, id) {
        const el = document.createElement('div');
        el.className = 'piece'; el.draggable = true; el.dataset.id = id;
        const r = Math.max(...shape.c.map(p => p[0])) + 1;
        const c = Math.max(...shape.c.map(p => p[1])) + 1;
        el.style.gridTemplateRows = `repeat(${r}, 28px)`;
        el.style.gridTemplateColumns = `repeat(${c}, 28px)`;
        shape.c.forEach(p => {
            const d = document.createElement('div'); d.className = 'p-cell';
            d.style.backgroundColor = shape.color; d.style.gridArea = `${p[0]+1} / ${p[1]+1}`; el.appendChild(d);
        });
        el.ondragstart = (e) => { e.dataTransfer.setData('pid', id); el.style.opacity = '0.3'; };
        el.ondragend = () => { el.style.opacity = '1'; clearPreview(); };
        return el;
    }

    gridEl.ondragover = (e) => {
        e.preventDefault(); clearPreview();
        const target = document.elementFromPoint(e.clientX, e.clientY);
        const idx = Array.from(gridEl.children).indexOf(target);
        const pid = document.querySelector('.piece[style*="opacity: 0.3"]')?.dataset.id;
        if(idx !== -1 && pid !== undefined) {
            const shape = trayShapes[pid];
            const r = Math.floor(idx/8), c = idx%8;
            if(canPlace(shape.c, r, c)) {
                shape.c.forEach(p => {
                    const tidx = (r+p[0])*8 + (c+p[1]);
                    if(tidx < 64) gridEl.children[tidx].classList.add('preview');
                });
            }
        }
    };

    gridEl.ondrop = (e) => {
        e.preventDefault();
        const pid = e.dataTransfer.getData('pid');
        const target = document.elementFromPoint(e.clientX, e.clientY);
        const idx = Array.from(gridEl.children).indexOf(target);
        if(idx !== -1 && pid !== "") {
            const shape = trayShapes[pid];
            const r = Math.floor(idx/8), c = idx%8;
            if(canPlace(shape.c, r, c)) {
                shape.c.forEach(p => {
                    const tidx = (r+p[0])*8 + (c+p[1]);
                    board[tidx] = shape.color;
                    gridEl.children[tidx].style.backgroundColor = shape.color;
                    gridEl.children[tidx].classList.add('occupied');
                });
                score += shape.c.length * 10;
                document.querySelector(`.piece[data-id="${pid}"]`).remove();
                trayShapes[pid] = null;
                checkLines();
                if(trayShapes.every(s => s === null)) spawnPieces();
                else updateScore();
            }
        }
    };

    function canPlace(coords, r, c) {
        return coords.every(p => {
            const nr = r + p[0], nc = c + p[1];
            return nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && !board[nr * 8 + nc];
        });
    }

    function checkLines() {
        let rs = [], cs = [];
        for(let i=0; i<8; i++) {
            if(board.slice(i*8, i*8+8).every(v=>v)) rs.push(i);
            let col = true; for(let j=0; j<8; j++) if(!board[j*8+i]) col = false;
            if(col) cs.push(i);
        }
        rs.forEach(r => { for(let c=0; c<8; c++) clearCell(r*8+c); score += 100; });
        cs.forEach(c => { for(let r=0; r<8; r++) clearCell(r*8+c); score += 100; });
        updateScore();
    }

    function clearCell(idx) { board[idx] = null; gridEl.children[idx].style.backgroundColor = ''; gridEl.children[idx].classList.remove('occupied'); }
    function clearPreview() { Array.from(gridEl.children).forEach(c => c.classList.remove('preview')); }
    
    function updateScore() {
        document.getElementById('score').innerText = score;
        if(score > best) { best = score; localStorage.setItem('bb_best_v3', best); document.getElementById('best').innerText = best; }
        checkGameOver();
    }

    function checkGameOver() {
        const available = trayShapes.filter(s => s !== null);
        if(available.length === 0) return;
        let possible = false;
        available.forEach(s => { for(let i=0; i<64; i++) if(canPlace(s.c, Math.floor(i/8), i%8)) possible = true; });
        if(!possible) { document.getElementById('final-score').innerText = score; document.getElementById('gameover').style.display = 'flex'; }
    }

    // --- SLOTS (JACKPOT 1000) ---
    function spin() {
        if(credits < 20) return alert("No credits!");
        credits -= 20; document.getElementById('balance').innerText = credits;
        
        const symbols = ['💎','💰','🔥','🍒','🔔','🃏'];
        const r = [symbols[Math.floor(Math.random()*symbols.length)], symbols[Math.floor(Math.random()*symbols.length)], symbols[Math.floor(Math.random()*symbols.length)]];
        
        document.getElementById('s1').innerText = r[0];
        document.getElementById('s2').innerText = r[1];
        document.getElementById('s3').innerText = r[2];

        if(r[0] === r[1] && r[1] === r[2]) {
            credits += 1000;
            document.getElementById('balance').innerText = credits;
            const ov = document.getElementById('jackpot-overlay');
            ov.style.display = 'flex';
            setTimeout(() => { ov.style.display = 'none'; }, 3000);
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    spawnPieces();
</script>
</body>
</html>
