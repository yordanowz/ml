<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>YORDANOWZ | HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --blue: #00f2ff;
            --pink: #ff0055;
            --discord: #5865F2;
            --bg: #030307;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at center, #0a0a20 0%, #030307 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--blue);
            font-family: 'Orbitron';
            position: sticky; top: 0; z-index: 100;
        }

        .center-date {
            color: #fff;
            text-shadow: 0 0 10px var(--blue);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-dots {
            color: var(--blue);
            font-size: 1.5rem;
            cursor: pointer;
            width: 50px;
            text-align: right;
            transition: 0.3s;
        }
        .menu-dots:hover { color: white; transform: scale(1.1); }

        /* СТРАНИЧНО МЕНЮ */
        .side-menu {
            position: fixed;
            top: 0;
            right: -300px; /* Скрито по подразбиране */
            width: 280px;
            height: 100%;
            background: rgba(5, 5, 10, 0.98);
            border-left: 2px solid var(--blue);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 1001;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        .side-menu.active { right: 0; }

        .close-menu {
            align-self: flex-end;
            font-size: 1.5rem;
            color: var(--pink);
            cursor: pointer;
            margin-bottom: 30px;
        }

        .menu-link {
            color: white;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-link i { color: var(--blue); width: 25px; }
        .menu-link:hover { background: rgba(0, 242, 255, 0.1); color: var(--blue); padding-left: 20px; }

        /* OVERLAY (затъмняване при отворено меню) */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1000;
        }
        .overlay.active { display: block; }

        /* ОСНОВЕН ДИЗАЙН */
        .main-hub {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hub-title {
            font-family: 'Orbitron';
            font-size: 3.5rem;
            letter-spacing: 10px;
            text-shadow: 0 0 20px var(--blue);
            margin-bottom: 50px;
            text-align: center;
        }

        .glass-container {
            position: relative;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-left: 5px solid var(--blue);
        }

        .wife-container { border-left-color: var(--pink); }

        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .p-pic { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--blue); object-fit: cover; box-shadow: 0 0 15px var(--blue); }
        .wife-pic { border-color: var(--pink); box-shadow: 0 0 15px var(--pink); }

        /* NEON HEART */
        .heart-svg {
            width: 80px;
            height: 80px;
            position: absolute;
            right: 40px;
            top: 30px;
            filter: drop-shadow(0 0 10px var(--pink));
            animation: heartBeat 1.5s infinite ease-in-out;
        }
        .heart-path { fill: none; stroke: var(--pink); stroke-width: 2; }

        @keyframes heartBeat {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--pink)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 20px var(--pink)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--pink)); }
        }

        @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

        .cosmic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; width: 100%; }
        .card { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; text-align: center; font-size: 2rem; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--blue); }

        .discord-btn {
            grid-column: 1 / -1; background: var(--discord); color: white; padding: 18px; border-radius: 12px; text-decoration: none; font-family: 'Orbitron'; text-align: center; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="side-menu" id="sideMenu">
        <div class="close-menu" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
        <h3 style="font-family:'Orbitron'; color:var(--blue); margin-bottom:20px;">NAVIGATION</h3>
        <a href="index.html" class="menu-link"><i class="fas fa-home"></i> HOME</a>
        <a href="games.html" class="menu-link"><i class="fas fa-gamepad"></i> GAMES</a>
        <a href="settings.html" class="menu-link"><i class="fas fa-user-gear"></i> SETTINGS</a>
    </nav>

<div class="top-bar">
    <div id="time" style="width: 100px;">00:00:00</div>
    
    <div class="center-date" id="full-date">LOADING...</div>

    <div id="active-users" style="color: #53fc18; font-family: 'Orbitron'; font-size: 0.8rem; text-shadow: 0 0 10px #53fc18;">
        <i class="fas fa-circle" style="font-size: 0.6rem; margin-right: 5px; animation: blink 1s infinite;"></i> 
        ACTIVE: <span id="user-count">1</span>
    </div>

    <div class="menu-dots" onclick="toggleMenu()"><i class="fas fa-ellipsis-v"></i></div>
</div>

    <main class="main-hub">
        <h1 class="hub-title">YORDANOWZ</h1>

        <div class="glass-container">
            <div class="profile-header">
                <img src="logo.png" class="p-pic" alt="User">
                <h2 style="color: var(--blue); font-family: 'Orbitron';">MY STATION</h2>
            </div>
            <div class="cosmic-grid">
                <a href="#" class="card"><i class="fab fa-instagram"></i></a>
                <a href="#" class="card"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="card"><i class="fab fa-kickstarter-k"></i></a>
                <a href="#" class="card"><i class="fab fa-twitch"></i></a>
                <a href="#" class="card"><i class="fas fa-credit-card"></i></a>
                <a href="#" class="discord-btn"><i class="fab fa-discord"></i> DISCORD SERVER</a>
            </div>
        </div>

        <div class="glass-container wife-container">
            <svg class="heart-svg" viewBox="0 0 32 32">
                <path class="heart-path" d="M16,28.22l-1.45-1.32C9.39,22.25,6,19.18,6,15.4c0-3.08,2.42-5.5,5.5-5.5c1.74,0,3.41,0.81,4.5,2.09c1.09-1.28,2.76-2.09,4.5-2.09 c3.08,0,5.5,2.42,5.5,5.5c0,3.78-3.39,6.85-8.55,11.5L16,28.22z"/>
            </svg>
            <div class="profile-header">
                <img src="wife-photo.jpg" class="p-pic wife-pic" alt="Wife">
                <h2 style="color: var(--pink); font-family: 'Orbitron';">MY WIFE ❤️</h2>
            </div>
            <div class="cosmic-grid">
                <a href="#" class="card"><i class="fab fa-instagram"></i></a>
                <a href="#" class="card"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="card"><i class="fas fa-credit-card"></i></a>
            </div>
        </div>
    </main>

    <script>

        // В началото на всяка страница (index и games)
const savedPrimary = localStorage.getItem('primaryColor');
const savedSecondary = localStorage.getItem('secondaryColor');

if (savedPrimary) {
    document.documentElement.style.setProperty('--blue', savedPrimary);
}
if (savedSecondary) {
    document.documentElement.style.setProperty('--pink', savedSecondary);
}

function updateActiveUsers() {
    // Симулираме реални хора: между 1 и 3 (за да не е 0, докато го тестваш сам)
    // Ако искаш да е съвсем реално за много хора, трябва Firebase или Socket.io
    let baseUsers = Math.floor(Math.random() * 3) + 1; 
    document.getElementById('user-count').innerText = baseUsers;
}

// Обновява числото на всеки 30 секунди, за да изглежда динамично
setInterval(updateActiveUsers, 30000);
updateActiveUsers();
        // Функция за отваряне/затваряне на менюто
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateAll() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('bg-BG');
            const days = ['Неделя', 'Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък', 'Събота'];
            document.getElementById('full-date').innerText = `${days[now.getDay()]}, ${now.toLocaleDateString('bg-BG')}`;
        }

        setInterval(updateAll, 1000);
        updateAll();
    </script>
</body>
</html>
