        }

        /* --- CYBER BUTTON (ENTER GAMING ZONE) --- */
        .gaming-link-wrap {
            grid-column: 1 / -1;
            margin: 10px 0;
            display: flex;
            justify-content: center;

        .cyber-btn {
            --primary: var(--blue);
            --secondary: var(--pink);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            text-transform: uppercase;
            color: #fff;
            cursor: pointer;
            position: relative;
            padding: 15px 40px;
            background: transparent;
            display: inline-block;
            transition: 0.3s;
            letter-spacing: 2px;
            width: 100%;
            text-align: center;
            border: none;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(45deg, transparent 5%, var(--primary) 5%);
            box-shadow: 4px 0px 0px var(--secondary);
            clip-path: polygon(92% 0, 100% 25%, 100% 100%, 8% 100%, 0% 75%, 0 0);
            z-index: -1;
        }

        .cyber-btn:hover {
            filter: drop-shadow(0 0 15px var(--blue));
            transform: scale(1.02);
        }

        .cyber-btn:hover::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--blue);
            opacity: 0.1;
            animation: glitch-anim 0.2s infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        .cyber-btn__text {

        .cyber-btn__tag {

        .f-name { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('bg-BG');
            const options = { weekday: 'long', year: 'numeric', month: 'numeric', day: 'numeric' };
            document.getElementById('full-date').innerText = now.toLocaleDateString('bg-BG', options).toUpperCase();
            
            const b = localStorage.getItem('primaryColor');
            const p = localStorage.getItem('secondaryColor');
            if(b) document.documentElement.style.setProperty('--blue', b);
            if(p) document.documentElement.style.setProperty('--pink', p);
        }

        // --- МУЗИКАЛЕН ПЛЕЙЪР С VOLUME КОНТРОЛ ---
        (function() {
            const playlist = ['gg.mp3', 'lm.mp3', 'ff.mp3'];
            const volSlider = document.getElementById('volume-slider');
            const volIcon = document.getElementById('vol-icon');

            const savedVol = localStorage.getItem('siteVolume') || 0.4;
            volSlider.value = savedVol;

            function updateVolIcon(val) {
                if(val == 0) volIcon.className = "fas fa-volume-mute";
                else if(val < 0.5) volIcon.className = "fas fa-volume-down";
                else volIcon.className = "fas fa-volume-up";
            }
            updateVolIcon(savedVol);

            function playTrack() {
                if (!window.myAudio) {
                    window.myAudio = new Audio();
                }

                const randomIndex = Math.floor(Math.random() * playlist.length);
                window.myAudio.src = playlist[randomIndex];
                window.myAudio.volume = volSlider.value;

                window.myAudio.play().catch(e => console.log("Waiting for click..."));

                window.myAudio.onended = () => playTrack();
            }

            volSlider.addEventListener('input', (e) => {
                const val = e.target.value;
                if(window.myAudio) window.myAudio.volume = val;
                updateVolIcon(val);
                localStorage.setItem('siteVolume', val);
            });

            function initAudio() {
                if (!window.myAudio || window.myAudio.paused) {
                    playTrack();
                }
                window.removeEventListener('mousedown', initAudio);
                window.removeEventListener('touchstart', initAudio);
            }

            window.addEventListener('mousedown', initAudio);
            window.addEventListener('touchstart', initAudio);
        })();

        setInterval(updateClock, 1000);
        updateClock();
    </script>
