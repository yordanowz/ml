<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ARCADE HUB | YORDANOWZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #00f2ff; --pink: #ff0055; --kick: #53fc18; --bg: #05050a; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at center, #0a0a20 0%, #030307 100%); 
            color: white; font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            /* Премахнато touch-action: none от тук, за да работи скрола */
        }

        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: #000; border-bottom: 2px solid var(--blue); 
            font-family: 'Orbitron'; color: var(--blue); width: 100%; position: sticky; top: 0; z-index: 100; 
        }

        .volume-wrap {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05); padding: 5px 10px;
            border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2);
        }
        #volume-slider { width: 50px; height: 3px; cursor: pointer; accent-color: var(--blue); }

        .main-container { max-width: 800px; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; flex-grow: 1; }

        .game-section { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .stats-row { display: flex; gap: 15px; margin-bottom: 15px; font-family: 'Orbitron'; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 10px; border: 1px solid #333; text-align: center; min-width: 110px; }
        
        /* touch-action: none само върху играта, за да не се мести страницата при драгване */
        .grid-8x8 { 
            display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); 
            gap: 4px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 12px; border: 3px solid #222; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative;
            touch-action: none;
        }
        .cell { width: 40px; height: 40px; background: rgba(255,255,255,0.02); border-radius: 4px; transition: 0.2s; }
        .cell.occupied { border: 1px solid rgba(255,255,255,0.3); }
        .cell.preview { background: rgba(255,255,255,0.2) !important; border: 1px dashed white; }
        
        .tray { 
            display: flex; justify-content: center; gap: 15px; margin-top: 20px; 
            min-height: 110px; background: rgba(255,255,255,0.02); border-radius: 15px; 
            padding: 15px; width: 100%; border: 1px solid rgba(255,255,255,0.05);
        }
        .piece { cursor: grab; display: grid; gap: 2px; z-index: 10; touch-action: none; }
        .p-cell { width: 22px; height: 22px; border-radius: 3px; pointer-events: none; }

        .slots-section { 
            background: rgba(0,0,0,0.4); border: 2px solid var(--kick); border-radius: 20px; 
            padding: 25px; width: 100%; max-width: 450px; text-align: center; 
            backdrop-filter: blur(10px); margin-bottom: 40px;
        }
        .slot-row { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .slot-box { 
            width: 70px; height: 70px; background: #000; border: 2px solid #333; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 2.2rem; transition: transform 0.1s;
        }

        #jackpot-overlay, #gameover { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; text-align: center; padding: 20px;
        }
        .jackpot-text { font-family: 'Orbitron'; font-size: 3.5rem; text-shadow: 0 0 30px currentColor; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        .btn { 
            background: var(--blue); color: #000; border: none; padding: 12px 30px; 
            font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; 
            cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block;
        }
        .btn:active { transform: scale(0.95); }

        footer { padding: 40px 30px; color: rgba(255,255,255,0.2); font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px; }

        @media (max-width: 450px) {
            .grid-8x8 { grid-template-columns: repeat(8, 34px); grid-template-rows: repeat(8, 34px); gap: 2px; }
            .cell { width: 34px; height: 34px; }
            .slot-box { width: 60px; height: 60px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div id="jackpot-overlay">
    <div class="jackpot-text">WIN!</div>
    <h1 id="win-amount" style="color:var(--kick); margin-top:20px">+0 CREDITS</h1>
</div>

<div id="gameover">
    <h1 style="font-family:'Orbitron'; font-size:3rem; color:var(--pink)">GAME OVER</h1>
    <p style="font-size:1.5rem; margin: 15px 0;">SCORE: <span id="final-score">0</span></p>
    <button class="btn" onclick="location.reload()">RETRY</button>
</div>

<div class="top-bar">
    <div id="clock">00:00:00</div>
    <div class="volume-wrap">
        <i class="fas fa-volume-up" id="vol-icon"></i>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>
    <a href="index.html" class="btn" style="padding: 5px 15px; font-size: 0.7rem;">HOME</a>
</div>

<div class="main-container">
    <div class="game-section">
        <div class="stats-row">
            <div class="stat-card">SCORE <br><span id="displayScore" style="color:var(--blue)">0</span></div>
            <div class="stat-card">BEST <br><span id="displayBest" style="color:var(--pink)">0</span></div>
        </div>
        <div id="grid" class="grid-8x8"></div>
        <div id="tray" class="tray"></div>
    </div>

    <div class="slots-section">
        <h2 style="font-family:'Orbitron'; color:var(--kick); font-size: 1rem;">LUCKY SLOTS</h2>
        <div class="slot-row">
            <div id="s1" class="slot-box">💎</div>
            <div id="s2" class="slot-box">💎</div>
            <div id="s3" class="slot-box">💎</div>
        </div>
        <p style="font-size:1.2rem; margin-bottom:15px; font-family: 'Orbitron';">CREDITS: <span id="balance" style="color:var(--kick)">500</span></p>
        <button class="btn" style="background:var(--kick); width: 100%;" onclick="spin()">SPIN (20)</button>
    </div>
</div>

<footer>
    MADE BY <span style="color: var(--blue);">@YORDANOWZ</span> @2026
</footer>

<script>
    // --- АУДИО МЕНИДЖЪР ---
    (function() {
        const playlist = ['gg.mp3', 'lm.mp3', 'ff.mp3'];
        const volSlider = document.getElementById('volume-slider');
        const volIcon = document.getElementById('vol-icon');

        const savedVol = localStorage.getItem('siteVolume') || 0.4;
        volSlider.value = savedVol;

        function updateVolIcon(val) {
            if(val == 0) volIcon.className = "fas fa-volume-mute";
            else if(val < 0.5) volIcon.className = "fas fa-volume-down";
            else volIcon.className = "fas fa-volume-up";
        }
        updateVolIcon(savedVol);

        function playTrack() {
            if (!window.myAudio) { window.myAudio = new Audio(); }
            const randomIndex = Math.floor(Math.random() * playlist.length);
            window.myAudio.src = playlist[randomIndex];
            window.myAudio.volume = volSlider.value;
            window.myAudio.play().catch(e => console.log("Waiting for interaction..."));
            window.myAudio.onended = () => playTrack();
        }

        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            if(window.myAudio) window.myAudio.volume = val;
            updateVolIcon(val);
            localStorage.setItem('siteVolume', val);
        });

        window.initAudio = function() {
            if (!window.myAudio || window.myAudio.paused) {
                playTrack();
            }
            window.removeEventListener('mousedown', initAudio);
            window.removeEventListener('touchstart', initAudio);
            window.removeEventListener('keydown', initAudio);
        };

        window.addEventListener('mousedown', initAudio);
        window.addEventListener('touchstart', initAudio);
        window.addEventListener('keydown', initAudio);
    })();

    // --- ГЛОБАЛНИ ПРОМЕНЛИВИ ---
    let credits = parseInt(localStorage.getItem('userCredits')) || 500;
    let currentScore = 0;
    let savedBest = parseInt(localStorage.getItem('bb_best_v3')) || 0;
    let board = Array(64).fill(null);
    let trayShapes = [];
    let activePiece = null;
    let offsetX, offsetY;

    const COLORS = ['#FF3D00', '#FFEA00', '#00E676', '#00B0FF', '#D500F9', '#FF0055'];
    const SHAPES = [
        { c: [[0,0]], color: COLORS[0] }, 
        { c: [[0,0],[0,1]], color: COLORS[1] },
        { c: [[0,0],[1,0]], color: COLORS[1] }, 
        { c: [[0,0],[0,1],[1,0],[1,1]], color: COLORS[2] },
        { c: [[0,0],[0,1],[0,2]], color: COLORS[3] }, 
        { c: [[0,0],[1,0],[2,0]], color: COLORS[3] },
        { c: [[0,0],[1,0],[2,0],[2,1]], color: COLORS[4] }, 
        { c: [[0,0],[0,1],[0,2],[1,1]], color: COLORS[5] }
    ];

    const gridEl = document.getElementById('grid');
    const trayEl = document.getElementById('tray');

    for(let i=0; i<64; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        gridEl.appendChild(cell);
    }

    function spawnPieces() {
        trayEl.innerHTML = ''; 
        trayShapes = [];
        for(let i=0; i<3; i++) {
            const s = SHAPES[Math.floor(Math.random()*SHAPES.length)];
            trayShapes.push(s);
            trayEl.appendChild(createPiece(s, i));
        }
        setTimeout(checkGameOver, 200);
    }

    function createPiece(shape, id) {
        const el = document.createElement('div');
        el.className = 'piece'; 
        el.dataset.id = id;
        
        const r = Math.max(...shape.c.map(p => p[0])) + 1;
        const c = Math.max(...shape.c.map(p => p[1])) + 1;
        el.style.gridTemplateRows = `repeat(${r}, auto)`;
        el.style.gridTemplateColumns = `repeat(${c}, auto)`;
        
        shape.c.forEach(p => {
            const d = document.createElement('div'); 
            d.className = 'p-cell';
            d.style.backgroundColor = shape.color; 
            d.style.gridArea = `${p[0]+1} / ${p[1]+1}`; 
            el.appendChild(d);
        });

        const startDrag = (e) => {
            if(window.initAudio) window.initAudio();
            activePiece = el;
            const pos = (e.type === 'touchstart') ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            offsetX = pos.clientX - rect.left;
            offsetY = pos.clientY - rect.top;
            
            el.style.position = 'fixed';
            el.style.width = rect.width + 'px';
            el.style.zIndex = '1000';
            el.style.pointerEvents = 'none';
            moveAt(pos.clientX, pos.clientY);
        };

        el.addEventListener('mousedown', startDrag);
        el.addEventListener('touchstart', startDrag, {passive: false});
        return el;
    }

    function moveAt(x, y) {
        if(!activePiece) return;
        activePiece.style.left = (x - offsetX) + 'px';
        activePiece.style.top = (y - offsetY) + 'px';

        clearPreview();
        const target = document.elementFromPoint(x, y);
        const idx = Array.from(gridEl.children).indexOf(target);
        if(idx !== -1) {
            const pid = activePiece.dataset.id;
            const shape = trayShapes[pid];
            const r = Math.floor(idx/8), c = idx%8;
            if(canPlace(shape.c, r, c)) {
                shape.c.forEach(p => {
                    const tidx = (r+p[0])*8 + (c+p[1]);
                    if(tidx < 64) gridEl.children[tidx].classList.add('preview');
                });
            }
        }
    }

    const onMove = (e) => {
        if(!activePiece) return;
        const pos = (e.type === 'touchmove') ? e.touches[0] : e;
        moveAt(pos.clientX, pos.clientY);
        if(e.type === 'touchmove') e.preventDefault();
    };

    const onEnd = (e) => {
        if(!activePiece) return;
        const pos = (e.type === 'touchend') ? e.changedTouches[0] : e;
        const target = document.elementFromPoint(pos.clientX, pos.clientY);
        const idx = Array.from(gridEl.children).indexOf(target);
        const pid = activePiece.dataset.id;
        const shape = trayShapes[pid];

        let placed = false;
        if(idx !== -1 && shape) {
            const r = Math.floor(idx/8), c = idx%8;
            if(canPlace(shape.c, r, c)) {
                shape.c.forEach(p => {
                    const tidx = (r+p[0])*8 + (c+p[1]);
                    board[tidx] = shape.color;
                    gridEl.children[tidx].style.backgroundColor = shape.color;
                    gridEl.children[tidx].classList.add('occupied');
                });
                currentScore += shape.c.length * 10;
                activePiece.remove();
                trayShapes[pid] = null;
                placed = true;
                checkLines();
                if(trayShapes.every(s => s === null)) spawnPieces();
                else updateScoreUI();
            }
        }

        if(!placed) {
            activePiece.style.position = 'static';
            activePiece.style.width = 'auto';
            activePiece.style.pointerEvents = 'auto';
        }
        
        clearPreview();
        activePiece = null;
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);

    function canPlace(coords, r, c) {
        return coords.every(p => {
            const nr = r + p[0], nc = c + p[1];
            return nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && !board[nr * 8 + nc];
        });
    }

    function checkLines() {
        let rs = [], cs = [];
        for(let i=0; i<8; i++) {
            if(board.slice(i*8, i*8+8).every(v=>v)) rs.push(i);
            let col = true; for(let j=0; j<8; j++) if(!board[j*8+i]) col = false;
            if(col) cs.push(i);
        }
        rs.forEach(r => { for(let c=0; c<8; c++) clearCell(r*8+c); currentScore += 100; });
        cs.forEach(c => { for(let r=0; r<8; r++) clearCell(r*8+c); currentScore += 100; });
        updateScoreUI();
    }

    function clearCell(idx) { board[idx] = null; gridEl.children[idx].style.backgroundColor = ''; gridEl.children[idx].classList.remove('occupied'); }
    function clearPreview() { Array.from(gridEl.children).forEach(c => c.classList.remove('preview')); }
    
    function updateScoreUI() {
        document.getElementById('displayScore').innerText = currentScore;
        if(currentScore > savedBest) { 
            savedBest = currentScore; 
            localStorage.setItem('bb_best_v3', savedBest); 
            document.getElementById('displayBest').innerText = savedBest; 
        }
        checkGameOver();
    }

    function checkGameOver() {
        const available = trayShapes.filter(s => s !== null);
        if(available.length === 0) return;
        let possible = false;
        available.forEach(s => { for(let i=0; i<64; i++) if(canPlace(s.c, Math.floor(i/8), i%8)) possible = true; });
        if(!possible) { 
            document.getElementById('final-score').innerText = currentScore; 
            document.getElementById('gameover').style.display = 'flex'; 
        }
    }

    function spin() {
        if(window.initAudio) window.initAudio();
        if(credits < 20) return alert("Нямате кредити!");
        credits -= 20; updateCredits();

        const symbols = ['💎','💰','🔥','🍒','🔔','🃏'];
        const r = [
            symbols[Math.floor(Math.random()*symbols.length)],
            symbols[Math.floor(Math.random()*symbols.length)],
            symbols[Math.floor(Math.random()*symbols.length)]
        ];

        document.getElementById('s1').innerText = r[0];
        document.getElementById('s2').innerText = r[1];
        document.getElementById('s3').innerText = r[2];

        let win = 0;
        let type = "";

        if(r[0] === r[1] && r[1] === r[2]) {
            if(r[0] === '💎') win = 1500;
            else if(r[0] === '💰') win = 1000;
            else win = 500;
            type = "JACKPOT!";
        } 
        else if(r[0] === r[1] || r[1] === r[2] || r[0] === r[2]) {
            win = 50;
            type = "SMALL WIN";
        }

        if(win > 0) {
            credits += win;
            updateCredits();
            showWin(type, win);
        }
    }

    function showWin(txt, amt) {
        const ov = document.getElementById('jackpot-overlay');
        const ovTxt = ov.querySelector('.jackpot-text');
        ovTxt.innerText = txt;
        ovTxt.style.color = (txt === "JACKPOT!") ? "#ffcc00" : "#00f2ff";
        document.getElementById('win-amount').innerText = `+${amt} CREDITS`;
        ov.style.display = 'flex';
        setTimeout(() => { ov.style.display = 'none'; }, 2000);
    }

    function updateCredits() {
        localStorage.setItem('userCredits', credits);
        document.getElementById('balance').innerText = credits;
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('displayBest').innerText = savedBest;
    document.getElementById('balance').innerText = credits;
    spawnPieces();
</script>
</body>
</html>
